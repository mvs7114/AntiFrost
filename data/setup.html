<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AntiFrost Configura Wi-Fi</title>
  <link rel="stylesheet" href="/camera.css">
</head>
<body>
  <main class="shell shell-narrow">
    <header class="topbar">
      <div>
        <h1>Configura Wi-Fi</h1>
        <p>Impostazione rete WLAN del dispositivo AntiFrost.</p>
      </div>
      <nav>
        <a href="/">Home</a>
        <button type="button" class="secondary" onclick="location.reload()">Aggiorna</button>
      </nav>
    </header>

    <section class="card page-card">
      <p>Connettiti alla rete AntiFrost usando la password <strong>antifrost-setup</strong>, poi inserisci la WLAN a cui deve collegarsi il dispositivo.</p>
      <div class="wifi-state" id="wifi-state">Stato Wi-Fi: caricamento...</div>

      <form method="post" action="/api/wifi">
        <label>
          SSID WLAN
          <input name="ssid" autocomplete="off" maxlength="32" required>
        </label>
        <label>
          Password WLAN
          <input name="password" type="password" autocomplete="current-password" maxlength="64">
        </label>
        <button type="submit" class="full">Salva e connetti</button>
      </form>
    </section>
  </main>
  <script>
    async function loadWifiStatus() {
      const el = document.getElementById("wifi-state");
      try {
        const response = await fetch("/api/wifi/status", { cache: "no-store" });
        if (!response.ok) {
          throw new Error("status " + response.status);
        }
        const data = await response.json();
        const staIp = data.sta?.ip && data.sta.ip.length > 0 ? data.sta.ip : "n/d";
        const apIp = data.softap?.ip && data.softap.ip.length > 0 ? data.softap.ip : "n/d";
        el.innerHTML = "<strong>Modalita:</strong> " + (data.mode || "UNKNOWN") +
          " | <strong>IP STA:</strong> " + staIp +
          " | <strong>IP SoftAP:</strong> " + apIp;
      } catch (error) {
        el.textContent = "Stato Wi-Fi non disponibile.";
      }
    }

    loadWifiStatus();
    setInterval(loadWifiStatus, 5000);
  </script>
</body>
</html>
