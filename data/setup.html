<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AntiFrost Wi-Fi</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f8fa;
      --panel: #ffffff;
      --text: #17202a;
      --muted: #51606f;
      --line: #d8dee6;
      --accent: #1976d2;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    main {
      width: min(36rem, calc(100vw - 2rem));
      padding: 2rem;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
    }

    h1 {
      margin: 0 0 0.75rem;
      font-size: 2rem;
      line-height: 1.1;
      letter-spacing: 0;
    }

    p {
      margin: 0.5rem 0 1.25rem;
      color: var(--muted);
      line-height: 1.5;
    }

    label {
      display: grid;
      gap: 0.4rem;
      margin-top: 1rem;
      color: var(--text);
      font-weight: 600;
    }

    input {
      width: 100%;
      min-height: 2.75rem;
      padding: 0.65rem 0.75rem;
      border: 1px solid var(--line);
      border-radius: 6px;
      color: var(--text);
      font: inherit;
    }

    button {
      width: 100%;
      min-height: 2.75rem;
      margin-top: 1.25rem;
      border: 0;
      border-radius: 6px;
      background: var(--accent);
      color: #ffffff;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
    }

    a {
      color: var(--accent);
    }

    .wifi-state {
      margin: 0.25rem 0 1rem;
      padding: 0.75rem 0.9rem;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #f9fbfd;
      color: var(--muted);
      line-height: 1.45;
    }

    .wifi-state strong {
      color: var(--text);
    }
  </style>
</head>
<body>
  <main>
    <h1>Wi-Fi AntiFrost</h1>
    <p>Connettiti alla rete AntiFrost usando la password <strong>antifrost-setup</strong>, poi inserisci la WLAN a cui deve collegarsi il dispositivo.</p>
    <div class="wifi-state" id="wifi-state">Stato Wi-Fi: caricamento...</div>
    <form method="post" action="/api/wifi">
      <label>
        SSID WLAN
        <input name="ssid" autocomplete="off" maxlength="32" required>
      </label>
      <label>
        Password WLAN
        <input name="password" type="password" autocomplete="current-password" maxlength="64">
      </label>
      <button type="submit">Salva e connetti</button>
    </form>
    <p><a href="/">Torna alla pagina iniziale</a></p>
  </main>
  <script>
    async function loadWifiStatus() {
      const el = document.getElementById("wifi-state");
      try {
        const response = await fetch("/api/wifi/status", { cache: "no-store" });
        if (!response.ok) {
          throw new Error("status " + response.status);
        }
        const data = await response.json();
        const staIp = data.sta?.ip && data.sta.ip.length > 0 ? data.sta.ip : "n/d";
        const apIp = data.softap?.ip && data.softap.ip.length > 0 ? data.softap.ip : "n/d";
        el.innerHTML = "<strong>Modalita:</strong> " + (data.mode || "UNKNOWN") +
          " | <strong>IP STA:</strong> " + staIp +
          " | <strong>IP SoftAP:</strong> " + apIp;
      } catch (error) {
        el.textContent = "Stato Wi-Fi non disponibile.";
      }
    }

    loadWifiStatus();
    setInterval(loadWifiStatus, 5000);
  </script>
</body>
</html>
