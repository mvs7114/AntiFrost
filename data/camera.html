<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AntiFrost Camera</title>
  <link rel="stylesheet" href="/camera.css">
</head>
<body>
  <main class="shell">
    <header class="topbar">
      <div>
        <h1>Camera Settings</h1>
        <p>AntiFrost ESP32-S3</p>
      </div>
      <nav>
        <a href="/">Home</a>
        <button type="button" class="secondary" onclick="location.reload()">Aggiorna</button>
      </nav>
    </header>

    <section class="workspace">
      <div class="preview">
        <div class="stream-frame">
          <div class="preview-empty" id="preview-empty">Preview non disponibile</div>
          <img id="stream" alt="Anteprima camera">
        </div>

        <div class="action-panel">
          <h2>Cattura immagine</h2>
          <div class="actions">
            <button type="button" id="preview-capture">Cattura immagine</button>
            <button type="button" id="preview-live">Avvia streaming</button>
          </div>
        </div>

        <div class="action-panel">
          <h2>Configurazione</h2>
          <div class="actions">
            <button type="button" id="apply">Applica</button>
            <button type="button" id="save-profile">Salva</button>
            <button type="button" id="restore-defaults">Ripristina default</button>
          </div>
        </div>

        <div class="action-panel status-panel">
          <h2>Stato</h2>
          <div class="status-line idle" id="status-line">Camera: sincronizzazione...</div>
        </div>
      </div>
    </section>

    <section class="controls">
      <h2>Parametri principali</h2>
      <div class="control-grid" id="safe-controls"></div>
    </section>

    <details class="controls" open>
      <summary>Parametri avanzati</summary>
      <div class="control-grid" id="advanced-controls"></div>
    </details>

    <details class="controls">
      <summary>Parametri rischiosi</summary>
      <p class="warning">Queste impostazioni possono bloccare la camera, produrre immagine nera o richiedere un riavvio.</p>
      <div class="control-grid" id="dangerous-controls"></div>
      <div class="danger-tools" id="danger-tools"></div>
    </details>
  </main>
  <script src="/camera.js" defer></script>
</body>
</html>
