; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = freenove_esp32_s3_wroom_n16r8

[env:freenove_esp32_s3_wroom_n16r8]
platform = espressif32
board = freenove_esp32_s3_wroom_n16r8
framework = espidf
board_build.mcu = esp32s3
board_build.flash_size = 16MB
board_upload.flash_size = 16MB
board_upload.maximum_size = 16777216
board_build.flash_mode = qio
board_build.f_flash = 80000000L
board_build.psram_type = opi
board_build.f_cpu = 240000000L
board_build.partitions = partitions_16mb.csv
board_build.filesystem = fatfs
upload_protocol = esptool
upload_port = COM6
upload_speed = 921600
monitor_port = COM6
monitor_speed = 115200
lib_deps =
	https://github.com/espressif/esp32-camera.git#v2.1.6
lib_ignore =
	esp32-camera
;extra_scripts =
;	pre:scripts/patch_esp32_camera.py
build_flags = 
	-DBOARD_HAS_PSRAM
	-DANTIFROST_BUILD_VERSION=\"Camera\0400.1.2\"
